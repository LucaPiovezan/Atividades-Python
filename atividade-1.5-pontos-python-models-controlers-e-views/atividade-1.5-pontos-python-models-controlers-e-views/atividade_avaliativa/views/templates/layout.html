<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Programação{% endblock %} · Cinema Python</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f7f3ee;
            --bg-alt: #efe9e0;
            --card: #ffffff;
            --card-border: #e2d9ce;
            --cortina: #7a1515;
            --cortina-escuro: #4a0a0a;
            --dourado: #b8860b;
            --dourado-claro: #d4a017;
            --texto: #1f1a16;
            --texto-fraco: #8a7e72;
            --texto-claro: #b8aaa0;
            --sombra: 0 4px 20px rgba(0, 0, 0, 0.06);
            --sombra-forte: 0 8px 40px rgba(0, 0, 0, 0.10);
            --borda-fina: 1px solid var(--card-border);
            --arred: 6px;
            --fonte-titulo: 'Playfair Display', Georgia, serif;
            --fonte-corpo: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--fonte-corpo);
            background: var(--bg);
            color: var(--texto);
            min-height: 100vh;
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 40px,
                    rgba(0,0,0,0.012) 40px,
                    rgba(0,0,0,0.012) 41px
                );
            pointer-events: none;
            z-index: 0;
        }

        /* ─── HEADER / CORTINA ─── */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(180deg, var(--cortina-escuro) 0%, var(--cortina) 100%);
            border-bottom: 3px solid var(--dourado);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 100%;
            height: 3px;
            background: repeating-linear-gradient(
                90deg,
                var(--dourado) 0px,
                var(--dourado) 20px,
                transparent 20px,
                transparent 24px
            );
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--dourado);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: var(--cortina-escuro);
            box-shadow: 0 0 0 2px rgba(184, 134, 11, 0.3);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-text strong {
            font-family: var(--fonte-titulo);
            font-size: 1.3rem;
            font-weight: 700;
            color: #f5f0e8;
            line-height: 1.2;
            letter-spacing: 0.5px;
        }

        .logo-text small {
            font-size: 0.65rem;
            color: var(--dourado-claro);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        nav a {
            color: rgba(245, 240, 232, 0.7);
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: var(--arred);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 7px;
            letter-spacing: 0.3px;
        }

        nav a:hover {
            color: #f5f0e8;
            background: rgba(255,255,255,0.06);
        }

        /* ─── MAIN ─── */
        .main {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 36px 24px 64px;
        }

        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--card-border);
        }

        .page-header h1 {
            font-family: var(--fonte-titulo);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--texto);
            line-height: 1.25;
        }

        .page-header h1 i {
            color: var(--cortina);
            margin-right: 10px;
            opacity: 0.7;
        }

        /* ─── BUTTONS ─── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 22px;
            border-radius: var(--arred);
            font-size: 0.82rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-family: inherit;
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: var(--cortina);
            color: #f5f0e8;
            box-shadow: 0 2px 0 var(--cortina-escuro);
        }

        .btn-primary:hover {
            background: var(--cortina-escuro);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(122, 21, 21, 0.3);
        }

        .btn-success {
            background: var(--dourado);
            color: #fff;
            box-shadow: 0 2px 0 #8a6508;
        }

        .btn-success:hover {
            background: var(--dourado-claro);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(184, 134, 11, 0.3);
        }

        .btn-sm {
            padding: 7px 16px;
            font-size: 0.78rem;
        }

        /* ─── TABLE ─── */
        .table-wrapper {
            background: var(--card);
            border-radius: var(--arred);
            border: var(--borda-fina);
            overflow: hidden;
            box-shadow: var(--sombra);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--bg-alt);
        }

        th {
            padding: 13px 20px;
            text-align: left;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--texto-fraco);
            border-bottom: 1px solid var(--card-border);
        }

        td {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            font-size: 0.88rem;
            color: var(--texto);
        }

        tbody tr:last-child td { border-bottom: none; }
        tbody tr { transition: background 0.15s; }
        tbody tr:hover { background: #fdfaf6; }

        td:first-child {
            font-weight: 600;
        }

        /* ─── BADGES ─── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 3px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .badge-sala {
            background: #f0ede8;
            color: var(--texto-fraco);
            border: 1px solid #e2d9ce;
        }

        .badge-preco {
            background: #f5f0e8;
            color: var(--dourado);
            border: 1px solid #e8dcc8;
        }

        .badge-class {
            background: rgba(122, 21, 21, 0.06);
            color: var(--cortina);
            border: 1px solid rgba(122, 21, 21, 0.15);
        }

        /* ─── EMPTY STATE ─── */
        .empty-state {
            text-align: center;
            padding: 64px 24px;
            background: var(--card);
            border-radius: var(--arred);
            border: var(--borda-fina);
            box-shadow: var(--sombra);
        }

        .empty-state i {
            font-size: 2.8rem;
            color: var(--texto-claro);
            margin-bottom: 16px;
        }

        .empty-state h2 {
            font-family: var(--fonte-titulo);
            font-size: 1.3rem;
            color: var(--texto);
            margin-bottom: 6px;
        }

        .empty-state p {
            color: var(--texto-fraco);
            font-size: 0.88rem;
            margin-bottom: 20px;
        }

        /* ─── FORM ─── */
        .form-card {
            max-width: 500px;
            background: var(--card);
            border-radius: var(--arred);
            border: var(--borda-fina);
            padding: 32px;
            box-shadow: var(--sombra);
        }

        .form-grupo {
            margin-bottom: 20px;
        }

        .form-grupo label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--texto-fraco);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .form-grupo select,
        .form-grupo input {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg);
            border: 1px solid var(--card-border);
            border-radius: var(--arred);
            color: var(--texto);
            font-size: 0.88rem;
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
        }

        .form-grupo select:focus,
        .form-grupo input:focus {
            border-color: var(--cortina);
            box-shadow: 0 0 0 3px rgba(122, 21, 21, 0.08);
            background: #fff;
        }

        .form-grupo select option {
            background: #fff;
            color: var(--texto);
        }

        .form-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 28px;
            gap: 12px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--texto-fraco);
            text-decoration: none;
            font-size: 0.82rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--texto);
        }

        /* ─── FOOTER ─── */
        .footer {
            text-align: center;
            padding: 24px;
            font-size: 0.72rem;
            color: var(--texto-claro);
            border-top: 1px solid var(--card-border);
            margin-top: 48px;
        }

        .footer i {
            color: var(--cortina);
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 768px) {
            .header-inner { padding: 0 16px; }
            .main { padding: 24px 16px; }
            .page-header h1 { font-size: 1.4rem; }
            th, td { padding: 10px 14px; }
            td { font-size: 0.82rem; }
            .form-card { padding: 20px; }
            .logo-text strong { font-size: 1.1rem; }
        }

        @media (max-width: 480px) {
            .header-inner { flex-wrap: wrap; height: auto; padding: 12px 16px; gap: 8px; }
            nav { width: 100%; }
            .table-wrapper { overflow-x: auto; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="{{ url_for('cinema.index') }}" class="logo">
                <span class="logo-icon"><i class="fas fa-python"></i></span>
                <span class="logo-text">
                    <strong>Cinema Python</strong>
                    <small>Programação de Sessões</small>
                </span>
            </a>
            <nav>
                <a href="{{ url_for('cinema.index') }}"><i class="fas fa-list-ul"></i> Programa&ccedil;&atilde;o</a>
                <a href="{{ url_for('cinema.cadastrar_sessao') }}"><i class="fas fa-plus"></i> Nova Sess&atilde;o</a>
            </nav>
        </div>
    </header>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <div class="footer">
        <i class="fas fa-film"></i> Cinema Python
    </div>
</body>
</html>
