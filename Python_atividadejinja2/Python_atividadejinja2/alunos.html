{% extends 'base.html' %}

{% block title %}Nome e Idade{% endblock %}

{% block content %}
    <h1>Alunos e Idades</h1>
    <ul>
        {% for aluno in alunos %}
            <li>
                <span>{{ aluno.nome }}</span>
                <span>Idade: {{ aluno.idade }}</span>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
